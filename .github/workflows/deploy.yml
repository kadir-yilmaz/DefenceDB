name: Deploy to WebDeploy

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Create appsettings.json from Secret
      env:
        APPSETTINGS_SECRET: ${{ secrets.APPSETTINGS_JSON }}
      run: |
        $path = "DefenceDB.WebUI/appsettings.json"
        if (![string]::IsNullOrWhiteSpace($env:APPSETTINGS_SECRET)) {
            Set-Content -Path $path -Value $env:APPSETTINGS_SECRET -Encoding utf8
        }
      shell: powershell

    - name: Inject COMMIT_SHA to appsettings.json
      run: |
        $path = "DefenceDB.WebUI/appsettings.json"
        if (Test-Path $path) {
            $json = Get-Content $path | ConvertFrom-Json
            $json | Add-Member -Type NoteProperty -Name "COMMIT_SHA" -Value "${{ github.sha }}" -Force
            $json | ConvertTo-Json -Depth 10 | Set-Content $path
        }
      shell: powershell

    - name: Build and Publish
      run: dotnet publish DefenceDB.WebUI/DefenceDB.WebUI.csproj -c Release -o "${{ github.workspace }}\publish"

    - name: Install EF Core Tools
      run: dotnet tool install --global dotnet-ef --version 8.0.*
      shell: powershell

    - name: Apply Database Migrations
      env:
        CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
      run: dotnet ef database update --project DefenceDB.DAL/DefenceDB.DAL.csproj --startup-project DefenceDB.WebUI/DefenceDB.WebUI.csproj --connection "$env:CONNECTION_STRING"
      shell: powershell

    - name: Deploy via MSDeploy
      env:
        WD_SERVER: ${{ secrets.WEBDEPLOY_SERVER }}
        WD_PORT: ${{ secrets.WEBDEPLOY_PORT }}
        WD_SITE: ${{ secrets.WEBDEPLOY_SITE }}
        WD_USERNAME: ${{ secrets.WEBDEPLOY_USERNAME }}
        WD_PASSWORD: ${{ secrets.WEBDEPLOY_PASSWORD }}
      run: |
        $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
        $publishPath = Join-Path $env:GITHUB_WORKSPACE "publish"
        
        $destArgs = "contentPath='$env:WD_SITE',ComputerName='https://$env:WD_SERVER`:$env:WD_PORT/msdeploy.axd?site=$env:WD_SITE',UserName='$env:WD_USERNAME',Password='$env:WD_PASSWORD',AuthType='Basic'"
        
        $arguments = @(
            "-verb:sync",
            "-source:contentPath=`"$publishPath`"",
            "-dest:$destArgs",
            "-allowUntrusted",
            "-enableRule:AppOffline",
            "-enableRule:DoNotDeleteRule"
        )
        
        & $msdeploy $arguments
      shell: powershell
