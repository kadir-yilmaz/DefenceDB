name: Deploy to WebDeploy

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Inject COMMIT_SHA to appsettings.json
      run: |
        $path = "DefenceDB.WebUI/appsettings.json"
        if (Test-Path $path) {
            $json = Get-Content $path | ConvertFrom-Json
            $json | Add-Member -Type NoteProperty -Name "COMMIT_SHA" -Value "${{ github.sha }}" -Force
            $json | ConvertTo-Json -Depth 10 | Set-Content $path
        }
      shell: powershell

    - name: Build and Publish
      run: dotnet publish DefenceDB.WebUI/DefenceDB.WebUI.csproj -c Release -o "${{ github.workspace }}\publish"

    - name: Deploy via MSDeploy
      run: |
        "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" -verb:sync -source:contentPath="${{ github.workspace }}\publish" -dest:contentPath="${{ secrets.WEBDEPLOY_SITE }}",ComputerName="https://${{ secrets.WEBDEPLOY_SERVER }}:${{ secrets.WEBDEPLOY_PORT }}/msdeploy.axd?site=${{ secrets.WEBDEPLOY_SITE }}",UserName="${{ secrets.WEBDEPLOY_USERNAME }}",Password="${{ secrets.WEBDEPLOY_PASSWORD }}",AuthType="Basic" -allowUntrusted -enableRule:AppOffline
      shell: cmd
